<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>邮件查看系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            background-attachment: fixed;
            min-height: 100vh;
            padding: 20px;
            animation: gradientShift 10s ease infinite;
        }
        
        @keyframes gradientShift {
            0%, 100% { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
            50% { background: linear-gradient(135deg, #764ba2 0%, #667eea 100%); }
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
            animation: fadeInDown 1s ease-out;
        }
        
        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .header h1 {
            font-size: 32px;
            margin-bottom: 10px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }
        
        .header p {
            font-size: 16px;
            opacity: 0.9;
        }
        
        .mail-input-card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1), 0 5px 15px rgba(0,0,0,0.07);
            margin-bottom: 30px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
            animation: fadeInUp 1s ease-out 0.3s both;
        }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .input-group {
            display: flex;
            gap: 15px;
            align-items: center;
            margin-bottom: 20px;
            position: relative;
        }
        
        .email-input-row {
            display: flex;
            gap: 15px;
        }
        
        .input-group input {
            flex: 1;
            padding: 18px 20px;
            border: 2px solid #e1e1e1;
            border-radius: 12px;
            font-size: 16px;
            transition: all 0.3s ease;
            background: rgba(255,255,255,0.9);
            position: relative;
        }
        
        .input-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
            background: white;
            transform: translateY(-2px);
        }
        
        .input-group input:valid {
            border-color: #28a745;
        }
        
        .get-mail-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 18px 35px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            white-space: nowrap;
            position: relative;
            overflow: hidden;
        }
        
        .get-mail-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.5s;
        }
        
        .get-mail-btn:hover::before {
            left: 100%;
        }
        
        .get-mail-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
        }
        
        .get-mail-btn:active {
            transform: translateY(-1px);
        }
        
        .get-mail-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        
        .loading {
            display: none;
            text-align: center;
            color: #667eea;
            font-size: 16px;
            margin: 20px 0;
            font-weight: 500;
        }
        
        .loading::after {
            content: '';
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid #667eea;
            border-radius: 50%;
            border-top: 2px solid transparent;
            animation: spin 1s linear infinite;
            margin-left: 10px;
            vertical-align: middle;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .mail-display {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1), 0 5px 15px rgba(0,0,0,0.07);
            display: none;
            border: 1px solid rgba(255,255,255,0.2);
            animation: fadeInUp 0.8s ease-out;
        }
        
        .mail-header {
            border-bottom: 2px solid #f1f1f1;
            padding-bottom: 20px;
            margin-bottom: 20px;
        }
        
        .mail-subject {
            font-size: 24px;
            font-weight: 600;
            color: #333;
            margin-bottom: 15px;
            line-height: 1.3;
        }
        
        .mail-meta {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            color: #666;
            font-size: 14px;
        }
        
        .mail-meta-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .mail-meta-label {
            font-weight: 600;
            color: #667eea;
            min-width: 60px;
        }
        
        .mail-body {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            max-height: 400px;
            overflow-y: auto;
            white-space: pre-wrap;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 14px;
            line-height: 1.6;
            border: 1px solid #e9ecef;
            word-wrap: break-word;
            word-break: break-word;
        }
        
        .message {
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-weight: 500;
        }
        
        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        .message.info {
            background: #cce7ff;
            color: #004085;
            border: 1px solid #b3d7ff;
        }
        


        
        @media (max-width: 768px) {
            .container {
                padding: 0 10px;
            }
            
            .header h1 {
                font-size: 24px;
            }
            
            .email-input-row {
                flex-direction: column;
                gap: 10px;
            }
            
            .proxy-controls {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }
            
            .mail-input-card, .mail-display {
                padding: 20px;
            }
            
            .mail-meta {
                grid-template-columns: 1fr;
            }
            

            

        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>📧 邮件查看系统</h1>
            <p>输入已添加的邮箱账号查看最新邮件</p>
        </div>
        
        <div class="mail-input-card">
            <div class="input-group">
                <input type="email" id="emailInput" placeholder="请输入邮箱地址 (例: user@example.com)" required>
                <button class="get-mail-btn" onclick="getMail()">获取邮件</button>
            </div>
            
            <div class="loading" id="loading">正在获取邮件，请稍候...</div>
            
            <div id="message"></div>
        </div>
        
        <div class="mail-display" id="mailDisplay">
            <div class="mail-header">
                <div class="mail-subject" id="mailSubject"></div>
                <div class="mail-meta">
                    <div class="mail-meta-item">
                        <span class="mail-meta-label">发件人:</span>
                        <span id="mailFrom"></span>
                    </div>
                    <div class="mail-meta-item">
                        <span class="mail-meta-label">收件人:</span>
                        <span id="mailTo"></span>
                    </div>
                    <div class="mail-meta-item">
                        <span class="mail-meta-label">时间:</span>
                        <span id="mailDate"></span>
                    </div>
                    <!-- 邮件大小显示已移除，按要求不显示邮件大小 -->
                </div>
            </div>
            
            <div class="mail-body" id="mailBody"></div>
        </div>
    </div>
    
    <script>
        // 回车键触发获取邮件
        document.getElementById('emailInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                getMail();
            }
        });
        
        async function getMail() {
            const emailInput = document.getElementById('emailInput');
            const loading = document.getElementById('loading');
            const message = document.getElementById('message');
            const mailDisplay = document.getElementById('mailDisplay');
            const getMailBtn = document.querySelector('.get-mail-btn');
            
            const email = emailInput.value.trim();
            
            if (!email) {
                showMessage('请输入邮箱地址', 'error');
                return;
            }
            
            if (!isValidEmail(email)) {
                showMessage('请输入有效的邮箱地址', 'error');
                return;
            }
            
            // 显示加载状态
            loading.style.display = 'block';
            getMailBtn.disabled = true;
            getMailBtn.textContent = '获取中...';
            message.innerHTML = '';
            mailDisplay.style.display = 'none';
            
            try {
                const response = await fetch('backend/api/get_mail.php', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ 
                        email: email
                    })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    if (data.mail) {
                        displayMail(data.mail);
                        let successMsg = '邮件获取成功';
                        
                        // 添加代理使用信息
                        if (data.proxy && data.proxy.used) {
                            successMsg += ` (通过代理: ${data.proxy.type.toUpperCase()} ${data.proxy.host}:${data.proxy.port})`;
                        }
                        
                        showMessage(successMsg, 'success');
                    } else {
                        let infoMsg = '邮箱中暂无邮件';
                        
                        // 添加代理使用信息
                        if (data.proxy && data.proxy.used) {
                            infoMsg += ` (通过代理: ${data.proxy.type.toUpperCase()} ${data.proxy.host}:${data.proxy.port})`;
                        }
                        
                        showMessage(infoMsg, 'info');
                    }
                } else {
                    showMessage(data.message || '获取邮件失败', 'error');
                }
                
            } catch (error) {
                console.error('请求失败:', error);
                showMessage('网络请求失败，请检查网络连接', 'error');
            } finally {
                // 隐藏加载状态
                loading.style.display = 'none';
                getMailBtn.disabled = false;
                getMailBtn.textContent = '获取邮件';
            }
        }
        
        function displayMail(mail) {
            document.getElementById('mailSubject').textContent = mail.subject || '(无主题)';
            document.getElementById('mailFrom').textContent = mail.from || '未知';
            document.getElementById('mailTo').textContent = mail.to || '未知';
            document.getElementById('mailDate').textContent = mail.date || '未知';
            // 邮件大小不再显示，按要求隐藏
            document.getElementById('mailBody').textContent = mail.body || '(邮件内容为空)';
            
            document.getElementById('mailDisplay').style.display = 'block';
        }
        
        function showMessage(text, type) {
            const message = document.getElementById('message');
            message.innerHTML = `<div class="message ${type}">${text}</div>`;
            
            // Auto-dismiss success and info messages after 3 seconds
            if (type === 'success' || type === 'info') {
                setTimeout(() => {
                    const currentMessage = message.querySelector(`.message.${type}`);
                    if (currentMessage && currentMessage.textContent.trim() === text.trim()) {
                        currentMessage.style.transition = 'opacity 0.5s ease-out';
                        currentMessage.style.opacity = '0';
                        setTimeout(() => {
                            if (message.querySelector(`.message.${type}`) === currentMessage) {
                                message.innerHTML = '';
                            }
                        }, 500); // Wait for fade-out animation
                    }
                }, 3000); // Auto-dismiss after 3 seconds
            }
        }
        
        function isValidEmail(email) {
            const re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            return re.test(email);
        }
        
        function formatFileSize(bytes) {
            if (bytes === 0) return '0 B';
            const k = 1024;
            const sizes = ['B', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }
    </script>
</body>
</html>
