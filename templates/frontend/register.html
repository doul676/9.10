{% extends "base.html" %}

{% block title %}用户注册 - 邮件查看系统{% endblock %}

{% block head %}
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }
    
    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        background-attachment: fixed;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
    }
    
    .register-container {
        background: white;
        border-radius: 20px;
        padding: 40px;
        box-shadow: 0 15px 35px rgba(0,0,0,0.1), 0 5px 15px rgba(0,0,0,0.07);
        max-width: 450px;
        width: 100%;
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255,255,255,0.2);
        animation: fadeInUp 0.8s ease-out;
    }
    
    @keyframes fadeInUp {
        from {
            opacity: 0;
            transform: translateY(50px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }
    
    .register-header {
        text-align: center;
        margin-bottom: 30px;
    }
    
    .register-header h1 {
        color: #333;
        font-size: 28px;
        margin-bottom: 10px;
    }
    
    .register-header p {
        color: #666;
        font-size: 14px;
    }
    
    .form-group {
        margin-bottom: 20px;
    }
    
    .form-group label {
        display: block;
        margin-bottom: 8px;
        color: #333;
        font-weight: 500;
    }
    
    .form-group input {
        width: 100%;
        padding: 15px;
        border: 2px solid #e1e1e1;
        border-radius: 10px;
        font-size: 16px;
        transition: all 0.3s ease;
        background: rgba(255,255,255,0.9);
    }
    
    .form-group input:focus {
        outline: none;
        border-color: #667eea;
        box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
        background: white;
        transform: translateY(-2px);
    }
    
    .register-btn {
        width: 100%;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        border: none;
        padding: 15px;
        border-radius: 10px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
        margin-bottom: 20px;
    }
    
    .register-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
    }
    
    .error-message {
        background: #f8d7da;
        color: #721c24;
        border: 1px solid #f5c6cb;
        padding: 12px;
        border-radius: 8px;
        margin-bottom: 20px;
        font-size: 14px;
    }
    
    .success-message {
        background: #d4edda;
        color: #155724;
        border: 1px solid #c3e6cb;
        padding: 12px;
        border-radius: 8px;
        margin-bottom: 20px;
        font-size: 14px;
    }
    
    .links {
        text-align: center;
        margin-top: 20px;
    }
    
    .links a {
        color: #667eea;
        text-decoration: none;
        font-size: 14px;
        margin: 0 10px;
        transition: color 0.3s ease;
    }
    
    .links a:hover {
        color: #5a67d8;
        text-decoration: underline;
    }
    
    .back-home {
        position: absolute;
        top: 20px;
        left: 20px;
        background: rgba(255,255,255,0.2);
        color: white;
        padding: 10px 20px;
        border-radius: 25px;
        text-decoration: none;
        font-size: 14px;
        backdrop-filter: blur(10px);
        transition: all 0.3s ease;
    }
    
    .back-home:hover {
        background: rgba(255,255,255,0.3);
        transform: translateY(-2px);
    }
    
    .password-tips {
        font-size: 12px;
        color: #666;
        margin-top: 5px;
    }
    
    @media (max-width: 768px) {
        .register-container {
            padding: 30px 20px;
            margin: 10px;
        }
        
        .back-home {
            position: static;
            display: inline-block;
            margin-bottom: 20px;
        }
    }
</style>
{% endblock %}

{% block body %}
<a href="{{ url_for('index') }}" class="back-home">← 返回首页</a>

<div class="register-container">
    <div class="register-header">
        <h1>📝 用户注册</h1>
        <p>注册后可免卡密查看邮件</p>
    </div>
    
    {% if error %}
    <div class="error-message">{{ error }}</div>
    {% endif %}
    
    {% if success %}
    <div class="success-message">{{ success }}</div>
    {% endif %}
    
    <form method="POST">
        <div class="form-group">
            <label for="username">用户名 *</label>
            <input type="text" id="username" name="username" required>
        </div>
        
        <div class="form-group">
            <label for="email">邮箱</label>
            <input type="email" id="email" name="email" placeholder="可选，用于找回密码">
        </div>
        
        <div class="form-group">
            <label for="password">密码 *</label>
            <input type="password" id="password" name="password" required>
            <div class="password-tips">密码长度至少6位</div>
        </div>
        
        <div class="form-group">
            <label for="confirm_password">确认密码 *</label>
            <input type="password" id="confirm_password" name="confirm_password" required>
        </div>
        
        <button type="submit" class="register-btn">注册</button>
    </form>
    
    <div class="links">
        <a href="{{ url_for('frontend_login') }}">已有账号？登录</a>
        <a href="{{ url_for('index') }}">使用卡密查看</a>
    </div>
</div>
{% endblock %}
